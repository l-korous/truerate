name: Daily summary

# Daily month-to-date cost snapshot emailed to the maintainer.
# - Azure cost: OIDC login + the SP's Cost Management Reader role (RG scope).
# - Email: Gmail SMTP secrets MAIL_USERNAME + MAIL_PASSWORD (a Gmail App Password).
# - GitHub Actions usage: GH_BILLING_PAT — shown ONLY if the API returns a sane
#   figure; otherwise we state the guardrail facts instead of a wrong number.
# Never hard-fails; if email isn't configured the report goes to the run summary.

on:
  schedule:
    - cron: "0 7 * * *" # daily 07:00 UTC
  workflow_dispatch: {}

permissions:
  id-token: write # OIDC for azure/login
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
      MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
      GH_BILLING_PAT: ${{ secrets.GH_BILLING_PAT }}
      RG: ${{ vars.AZURE_RG || 'truerate-rg' }}
      SUB: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      OWNER: ${{ github.repository_owner }}
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build daily summary
        id: report
        run: |
          set -uo pipefail
          az config set extension.use_dynamic_install=yes_without_prompt -o none || true
          az extension add --name costmanagement -o none 2>/dev/null || true

          # ---- Azure month-to-date (RG scope) ----
          AZ_COST="unavailable"; AZ_CUR=""
          COST_JSON=$(az costmanagement query --type ActualCost --timeframe MonthToDate \
            --scope "/subscriptions/$SUB/resourceGroups/$RG" \
            --dataset-aggregation '{"totalCost":{"name":"PreTaxCost","function":"Sum"}}' \
            -o json 2>/dev/null || echo "")
          if [ -n "$COST_JSON" ] && echo "$COST_JSON" | jq -e '.properties.rows' >/dev/null 2>&1; then
            AZ_COST=$(echo "$COST_JSON" | jq -r '(([.properties.rows[]?[0]] | add) // 0)')
            AZ_CUR=$(echo "$COST_JSON" | jq -r '(.properties.rows[0][1]) // ""')
          fi
          if [ "$AZ_COST" = "unavailable" ]; then
            AZ_LINE="Azure (RG ${RG}): figure pending (Cost Management data lags up to ~24h / role just granted). HARD CAP: EUR 5/mo budget with email alerts at 50/90/100% + forecast, so it cannot exceed ~5 EUR without emailing you."
          else
            AZ_LINE="Azure (RG ${RG}): ${AZ_COST} ${AZ_CUR} month-to-date. HARD CAP: EUR 5/mo budget with email alerts at 50/90/100%."
          fi

          # ---- GitHub Actions (trust a figure only if it's sane; else guardrail) ----
          GH_LINE="GitHub Actions: Free plan includes 2,000 private-repo minutes/mo; the overage spending limit defaults to \$0, so workflows PAUSE at the cap instead of billing. Exact usage: https://github.com/settings/billing"
          if [ -n "${GH_BILLING_PAT:-}" ]; then
            GH_JSON=$(GH_TOKEN="$GH_BILLING_PAT" gh api "users/$OWNER/settings/billing/actions" 2>/dev/null || echo "")
            inc=$(echo "$GH_JSON" | jq -r '.included_minutes // 0' 2>/dev/null || echo 0)
            used=$(echo "$GH_JSON" | jq -r '.total_minutes_used // 0' 2>/dev/null || echo 0)
            paid=$(echo "$GH_JSON" | jq -r '.total_paid_minutes_used // 0' 2>/dev/null || echo 0)
            if [ "${inc:-0}" -gt 0 ] 2>/dev/null; then
              GH_LINE="GitHub Actions (MTD): ${used} / ${inc} included minutes used; paid (billable) minutes: ${paid}. Overage spending limit defaults to \$0 (pauses, no surprise bill)."
            fi
          fi

          # ---- Progress (last 24h) ----
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ')
          P_OPEN=$(gh issue list --repo "$REPO" --state open --json number --jq 'length' 2>/dev/null || echo "?")
          P_READY=$(gh issue list --repo "$REPO" --state open --label agent-ready --json number --jq 'length' 2>/dev/null || echo "?")
          P_MERGED=$(gh pr list --repo "$REPO" --state merged --search "merged:>=$SINCE" --json number --jq 'length' 2>/dev/null || echo "?")
          P_MVP=$(gh issue list --repo "$REPO" --milestone "MVP — core loop" --state open --json number --jq 'length' 2>/dev/null || echo "?")
          P_DEPLOY=$(gh run list --repo "$REPO" --workflow "Deploy (Azure)" --limit 1 --json conclusion --jq '.[0].conclusion // "none"' 2>/dev/null || echo "?")
          PROG_LINE="Progress (24h): ${P_MERGED} PRs merged · ${P_OPEN} issues open (${P_READY} agent-ready) · MVP open: ${P_MVP} · last deploy: ${P_DEPLOY}"

          MONTH=$(date -u +%Y-%m)
          NOW=$(date -u '+%Y-%m-%d %H:%M UTC')
          {
            echo "TrueRate daily summary — ${MONTH} (as of ${NOW})"
            echo ""
            echo "PROGRESS"
            echo "  ${PROG_LINE}"
            echo "  Live: https://truerate-web.victoriousdune-875f3535.westeurope.azurecontainerapps.io"
            echo ""
            echo "COST"
            echo "  ${AZ_LINE}"
            echo ""
            echo "  ${GH_LINE}"
            echo ""
            echo "  Claude Max: flat subscription — agent runs draw from plan quota (rate-limited), never billed per run."
            echo ""
            echo "BOTTOM LINE: with the EUR 5 Azure budget, GitHub's \$0 default overage limit, and Claude Max being flat-rate, a surprise bill is not possible unless you raise a limit yourself."
            echo "Actions: https://github.com/${OWNER}/truerate/actions"
          } > body.txt
          cat body.txt >> "$GITHUB_STEP_SUMMARY"
          echo "----- report -----"; cat body.txt
          echo "subject=TrueRate daily summary — ${P_MERGED} merged/24h, MVP open ${P_MVP} (${NOW})" >> "$GITHUB_OUTPUT"

      - name: Send email
        if: ${{ env.MAIL_USERNAME != '' && env.MAIL_PASSWORD != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.report.outputs.subject }}
          to: lukas.korous@gmail.com
          from: TrueRate Daily Summary <${{ secrets.MAIL_USERNAME }}>
          body: file://body.txt

      - name: Note if email not configured
        if: ${{ env.MAIL_USERNAME == '' || env.MAIL_PASSWORD == '' }}
        run: echo "::notice::Email not sent — add repo secrets MAIL_USERNAME + MAIL_PASSWORD (Gmail App Password)."
