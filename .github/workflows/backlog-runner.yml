name: Backlog runner

# Continuous, conservative backlog cruncher.
#
# On a schedule, IF no agent PR is already in flight, pick the next issue
# labelled `agent-ready` (lowest number, not `blocked`, no existing claude/*
# branch) and have Claude implement it on a branch + open a PR for review.
#
# - Up to MAX_INFLIGHT agent PRs open at once (default 6), one new per hourly
#   run, serialized by `concurrency`. This lets the backlog keep flowing while
#   no one is around to merge (there is no auto-merge); PRs queue for review.
# - NO auto-merge: every PR is for review until the "auto-merge readiness gate"
#   (#159) is satisfied and the repo can enforce required checks.
# - Queue = the `agent-ready` label. Nothing runs until issues carry it.
# - Model runs on the Max plan via CLAUDE_CODE_OAUTH_TOKEN (no API billing);
#   only GitHub Actions minutes are consumed.

on:
  schedule:
    - cron: "7,37 * * * *" # every ~30 min (offset off :00/:30 to avoid fleet collisions)
  workflow_dispatch: {}

concurrency:
  group: backlog-runner
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: write # pick step queries runs; final step chains the next run

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Full autonomy: keep the agent-ready queue fed by PRIORITY so the loop
      # works the whole implementable backlog without a human deciding what's
      # next. When fewer than MIN_QUEUE eligible (agent-ready, no branch) issues
      # remain, label the next ones by priority (P0->P1->P2->none, then number).
      # Exclusions = work that can't run headlessly and must stay human-driven:
      #   blocked, needs-design, no-auto (owner/secrets/data/spec), type:epic,
      #   type:spike, area:scraping (live data), area:infra / area:ci-cd /
      #   area:auth / area:observability (cloud provisioning, secrets, deploy).
      - name: Auto-enqueue next issues by priority
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          eligible=0
          for n in $(gh issue list --repo "$REPO" --state open --label agent-ready --json number,labels \
              --jq '[ .[] | {n:.number, L:[.labels[].name]} | select((.L|index("blocked"))|not) ] | .[].n'); do
            br=$(gh api "repos/$REPO/git/matching-refs/heads/claude/$n-" --jq 'length' 2>/dev/null || echo 0)
            if [ "${br:-0}" -eq 0 ]; then eligible=$((eligible+1)); fi
          done
          MIN_QUEUE=3
          need=$(( MIN_QUEUE - eligible ))
          if [ "$need" -le 0 ]; then echo "Queue healthy (eligible=$eligible >= $MIN_QUEUE)."; exit 0; fi
          echo "Eligible=$eligible < $MIN_QUEUE — auto-enqueuing up to $need by priority."
          cands=$(gh issue list --repo "$REPO" --state open --limit 300 --json number,labels --jq '
            [ .[] | {n:.number, L:[.labels[].name]}
              | select((.L|index("agent-ready"))|not)
              | select( ["blocked","needs-design","no-auto","type:epic","type:spike","desktop",
                         "area:scraping","area:infra","area:ci-cd","area:auth","area:observability"]
                        as $X | (.L|any(. as $l | $X|index($l))) | not )
              | {n, p:(if (.L|index("P0")) then 0 elif (.L|index("P1")) then 1 elif (.L|index("P2")) then 2 else 3 end)} ]
            | sort_by(.p, .n) | .[].n')
          c=0
          for n in $cands; do
            if [ "$c" -ge "$need" ]; then break; fi
            if gh api -X POST "repos/$REPO/issues/$n/labels" -f "labels[]=agent-ready" >/dev/null 2>&1; then
              echo "auto-enqueued #$n"; c=$((c+1))
            else
              echo "could not label #$n"
            fi
          done
          if [ "$c" -eq 0 ]; then echo "Nothing eligible left to enqueue — autonomous backlog drained."; fi
          echo "Auto-enqueue done (added $c)."

      - name: Pick next agent-ready issue
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          inflight=$(gh pr list --repo "$REPO" --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("claude/"))] | length')
          active=$(gh run list --repo "$REPO" --workflow "Claude Code" --json status \
            --jq '[.[] | select(.status=="in_progress" or .status=="queued")] | length')
          MAX_INFLIGHT=6
          if [ "$inflight" -ge "$MAX_INFLIGHT" ] || [ "$active" -ge 1 ]; then
            echo "At capacity (open agent PRs=$inflight/$MAX_INFLIGHT, active runs=$active). Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          # Highest-PRIORITY agent-ready issue that has NO claude/<n>-* branch yet
          # (P0 < P1 < P2 < none, then lowest number). Skip-and-CONTINUE past
          # issues already in progress / done-awaiting-merge, so one completed-but-
          # unmerged issue can't wedge the whole queue.
          # Exclude `desktop` issues: those require a real browser / local resources
          # (scraping, bulk import) and are run by the desktop agent, not cloud CI.
          CANDIDATES=$(gh issue list --repo "$REPO" --state open --label agent-ready --json number,labels \
            --jq '[ .[] | {n:.number, L:[.labels[].name]} | select( (.L|index("blocked")) | not ) | select( (.L|index("desktop")) | not )
                    | {n, p:(if (.L|index("P0")) then 0 elif (.L|index("P1")) then 1 elif (.L|index("P2")) then 2 else 3 end)} ]
                  | sort_by(.p, .n) | .[].n')
          PICK=""
          for n in $CANDIDATES; do
            br=$(gh api "repos/$REPO/git/matching-refs/heads/claude/$n-" --jq 'length' 2>/dev/null || echo 0)
            if [ "${br:-0}" -eq 0 ]; then PICK="$n"; break; fi
          done
          if [ -z "$PICK" ]; then
            echo "No eligible agent-ready issue (remaining ones already have branches/PRs)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "Selected issue #$PICK."
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "issue=$PICK" >> "$GITHUB_OUTPUT"

      # Give the agent a working toolchain so it can run typecheck/tests itself
      # before opening a PR (CLAUDE.md requires verifying, not guessing).
      - uses: pnpm/action-setup@v4
        if: steps.pick.outputs.should_run == 'true'
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        if: steps.pick.outputs.should_run == 'true'
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        if: steps.pick.outputs.should_run == 'true'
        run: pnpm install --frozen-lockfile

      - name: Implement the issue with Claude
        if: steps.pick.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Scheduled runs have actor=github-actions[bot]; the action's GitHub-App
          # token exchange rejects bot actors (401 "no write access") since ~Jun 2026.
          # Supplying github_token skips the exchange. Safe here: triggers are
          # schedule/dispatch only (no untrusted surface). GITHUB_TOKEN pushes don't
          # fire CI on agent branches — the auto-merge sweeper's zero-checks self-heal
          # dispatches CI explicitly. (#374)
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # This workflow runs ONLY on schedule + workflow_dispatch (no untrusted
          # trigger surface), and the loop dispatches itself / is nudged by
          # auto-merge via GITHUB_TOKEN, so the actor is github-actions[bot].
          # Without this, the action aborts ("Workflow initiated by non-human
          # actor") and the loop only works when a human dispatches it.
          allowed_bots: "*"
          # bypassPermissions: this is an ephemeral CI sandbox, the agent needs
          # Edit/Write/Bash to implement, verify, commit and push. --max-turns
          # bounds a single run so it can't drain the whole Max window.
          claude_args: "--max-turns 80 --permission-mode bypassPermissions"
          prompt: |
            You are running headless in CI. Implement GitHub issue #${{ steps.pick.outputs.issue }}.

            1. Read CLAUDE.md and issue #1 (the authoritative product model) and the issue itself.
            2. IMMEDIATELY create a branch, push it, and open a DRAFT PR — so partial
               progress is never lost if you run out of turns:
                 git checkout -b claude/${{ steps.pick.outputs.issue }}-<short-slug>
                 git commit --allow-empty -m "start #${{ steps.pick.outputs.issue }}"
                 git push -u origin HEAD
                 gh pr create --draft --base main --head claude/${{ steps.pick.outputs.issue }}-<short-slug> \
                   --title "agent: implement #${{ steps.pick.outputs.issue }}" \
                   --body "Closes #${{ steps.pick.outputs.issue }}"
            3. Implement the change WITH tests (unit / e2e / MCP as appropriate),
               committing and pushing as you go.
            4. VERIFY: run `pnpm typecheck` and `pnpm test` (and any package-specific
               checks) and confirm they pass. Do not mark ready while red.
            5. When done and green: gh pr ready claude/${{ steps.pick.outputs.issue }}-<short-slug>

            If the issue is too large to finish this run, leave the draft PR with your
            progress and a checklist of what remains. Do not force it.
            Hard rules: never push to main; never introduce price handling (see #1);
            keep Azure cost minimal; follow CLAUDE.md exactly.

      # Safety net: if the agent pushed a branch but didn't open a PR, open it so
      # CI (which also runs on pushes to claude/**) is visible for review.
      - name: Ensure a PR exists
        if: steps.pick.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE: ${{ steps.pick.outputs.issue }}
        run: |
          set -uo pipefail
          ref=$(gh api "repos/$REPO/git/matching-refs/heads/claude/$ISSUE-" --jq '.[0].ref // empty' || true)
          [ -z "$ref" ] && { echo "Agent created no branch for #$ISSUE; nothing to open."; exit 0; }
          branch="${ref#refs/heads/}"
          existing=$(gh pr list --repo "$REPO" --state open --head "$branch" --json number --jq 'length')
          if [ "$existing" -ge 1 ]; then echo "PR already open for $branch."; exit 0; fi
          gh pr create --repo "$REPO" --base main --head "$branch" \
            --title "agent: implement #$ISSUE" --body "Closes #$ISSUE" || echo "Could not auto-open PR (open it manually)."

      # Cadence is the ~30-min cron + a nudge from auto-merge after each merge
      # (which frees an in-flight slot). No aggressive self-chaining: this keeps a
      # predictable ~30-min implementer rhythm so the 4h groomer lands roughly
      # once per 8 implementer runs (the desired impl:groom ratio).
