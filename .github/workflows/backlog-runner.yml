name: Backlog runner

# Continuous, conservative backlog cruncher.
#
# On a schedule, IF no agent PR is already in flight, pick the next issue
# labelled `agent-ready` (lowest number, not `blocked`, no existing claude/*
# branch) and have Claude implement it as a pull request.
#
# - ONE issue at a time: the in-flight guard means it waits until you merge or
#   close the current agent PR before starting the next.
# - NO auto-merge: every PR is opened for review. Auto-merge is only enabled
#   once the "auto-merge readiness gate" tracking issue is satisfied AND the
#   repo can enforce required checks (GitHub Pro or public).
# - The queue is the `agent-ready` label. Nothing runs until issues carry it.
# - Cost: the model runs on the Max plan via CLAUDE_CODE_OAUTH_TOKEN (no API
#   billing); only GitHub Actions minutes are consumed. Hourly + 1-in-flight
#   keeps that small (skipped ticks cost seconds).

on:
  schedule:
    - cron: "17 * * * *" # hourly, at :17
  workflow_dispatch: {}

concurrency:
  group: backlog-runner
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read # the pick step queries workflow runs (1-in-flight guard)

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pick next agent-ready issue
        id: pick
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # 1-in-flight guard: any open PR on a claude/* branch, or any active
          # Claude Code run (the @claude path), means we wait.
          inflight=$(gh pr list --repo "$REPO" --state open --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("claude/"))] | length')
          active=$(gh run list --repo "$REPO" --workflow "Claude Code" --json status \
            --jq '[.[] | select(.status=="in_progress" or .status=="queued")] | length')
          if [ "$inflight" -ge 1 ] || [ "$active" -ge 1 ]; then
            echo "Agent work already in flight (open agent PRs=$inflight, active runs=$active). Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Next ready issue: open, labelled agent-ready, not blocked, lowest number.
          next=$(gh issue list --repo "$REPO" --state open --label agent-ready --json number,labels \
            --jq '[ .[] | select( (.labels|map(.name)|index("blocked")) | not ) ] | sort_by(.number) | (.[0].number // empty)')
          if [ -z "$next" ]; then
            echo "No agent-ready issues in the queue."
            echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          # Don't restart one that already has a branch (in-progress or abandoned).
          existing=$(gh api "repos/$REPO/git/matching-refs/heads/claude/$next-" --jq 'length')
          if [ "$existing" -ge 1 ]; then
            echo "Branch claude/$next-* already exists; skipping (needs manual cleanup)."
            echo "should_run=false" >> "$GITHUB_OUTPUT"; exit 0
          fi

          echo "Selected issue #$next."
          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "issue=$next" >> "$GITHUB_OUTPUT"

      - name: Implement the issue with Claude
        if: steps.pick.outputs.should_run == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          # Max-plan auth (no pay-as-you-go API billing).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Bound a single run so a stuck agent can't drain the whole Max window.
          claude_args: "--max-turns 50"
          prompt: |
            Implement GitHub issue #${{ steps.pick.outputs.issue }} in this repository.

            1. First read CLAUDE.md and issue #1 (the authoritative product model), then the issue itself.
            2. Create a branch named claude/${{ steps.pick.outputs.issue }}-<short-slug>.
            3. Implement the change WITH tests (unit / e2e / MCP as appropriate to the issue).
            4. Open a pull request targeting `main` whose body contains "Closes #${{ steps.pick.outputs.issue }}" and checks off the issue's Definition of Done.

            Hard rules: never push to `main`; never introduce price handling (see #1);
            keep Azure cost minimal; follow CLAUDE.md exactly.
