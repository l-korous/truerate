name: Diag logs (temporary)
on: { workflow_dispatch: {} }
permissions: { id-token: write, contents: read }
jobs:
  logs:
    runs-on: ubuntu-latest
    env:
      RG: ${{ vars.AZURE_RG || 'truerate-rg' }}
      PREFIX: ${{ vars.AZURE_PREFIX || 'truerate' }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Inspect api revision state
        run: |
          set -uo pipefail
          echo "=== ACTIVE running image ==="
          az containerapp show -g "$RG" -n "${PREFIX}-api" --query "properties.template.containers[0].image" -o tsv 2>&1
          echo "=== latest 5 revisions: name | active | running | health | imageTag | created ==="
          az containerapp revision list -g "$RG" -n "${PREFIX}-api" -o json 2>&1 \
            | python3 -c "import sys,json; d=json.load(sys.stdin); rs=sorted(d,key=lambda r:r['properties'].get('createdTime',''),reverse=True)[:5]; [print(r['name'], r['properties'].get('active'), r['properties'].get('runningState'), r['properties'].get('healthState'), r['properties']['template']['containers'][0]['image'].split(':')[-1][:12], r['properties'].get('createdTime','')) for r in rs]" 2>&1
          echo "=== traffic weights ==="
          az containerapp ingress traffic show -g "$RG" -n "${PREFIX}-api" -o json 2>&1 | python3 -c "import sys,json;[print(t) for t in json.load(sys.stdin)]" 2>&1 || true
