name: Diag logs (temporary)
on: { workflow_dispatch: {} }
permissions: { id-token: write, contents: read }
jobs:
  logs:
    runs-on: ubuntu-latest
    env:
      RG: ${{ vars.AZURE_RG || 'truerate-rg' }}
      PREFIX: ${{ vars.AZURE_PREFIX || 'truerate' }}
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Reproduce 500 + query Log Analytics for the onError trace
        run: |
          set -uo pipefail
          API="https://$(az containerapp show -g "$RG" -n "${PREFIX}-api" --query properties.configuration.ingress.fqdn -o tsv)"
          TOKEN=$(curl -s -X POST "$API/auth/register" -H 'content-type: application/json' -d "{\"email\":\"diag-$(date +%s)@example.com\",\"password\":\"diag-pass-123\"}" | sed -n 's/.*"token":"\([^"]*\)".*/\1/p')
          echo "add-membership status: $(curl -s -o /dev/null -w '%{http_code}' -X POST "$API/memberships" -H "authorization: Bearer $TOKEN" -H 'content-type: application/json' -d '{"programId":"booking_genius","tier":"Level 3"}')"
          echo "waiting 110s for Log Analytics ingestion..."; sleep 110
          WS=$(az monitor log-analytics workspace list -g "$RG" --query "[0].customerId" -o tsv)
          echo "workspace customerId: $WS"
          echo "==================== onError TRACE (Log Analytics) ===================="
          az monitor log-analytics query --workspace "$WS" \
            --analytics-query "ContainerAppConsoleLogs_CL | where TimeGenerated > ago(20m) | where Log_s contains 'unhandled error' | project TimeGenerated, Log_s | order by TimeGenerated desc | take 6" \
            -o json 2>&1 | python3 -c "import sys,json;d=json.load(sys.stdin);[print(r.get('Log_s','')) for r in d]" 2>&1 || echo "query/parse failed"
