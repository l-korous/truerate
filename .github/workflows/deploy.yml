name: Deploy (Azure)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# One deploy at a time; let an in-flight deploy finish.
concurrency:
  group: deploy-azure
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for OIDC federated login to Azure
  packages: write # required to push container images to ghcr.io and flip visibility

jobs:
  deploy:
    name: Build images and deploy to Azure Container Apps
    runs-on: ubuntu-latest
    environment: production
    env:
      # Non-sensitive config: set as repository VARIABLES (Settings → Secrets and
      # variables → Actions → Variables), or rely on these defaults.
      RG: ${{ vars.AZURE_RG || 'truerate-rg' }}
      LOCATION: ${{ vars.AZURE_LOCATION || 'westeurope' }}
      PREFIX: ${{ vars.AZURE_PREFIX || 'truerate' }}
      IMAGE_TAG: ${{ github.sha }}
      # ghcr.io packages live under the repo owner's namespace, lowercased.
      GHCR_OWNER: ${{ github.repository_owner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Web bakes the API URL at build time. The API app's FQDN is stable once
      # created, so on first deploy this is empty and the web image rebuilds on
      # the next deploy with the real URL. (Deterministic enough for hobby use.)
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Look up existing API URL + last-good image (web build arg + rollback)
        id: api-url
        run: |
          set -euo pipefail
          az group create -n "$RG" -l "$LOCATION" -o none
          API_FQDN=$(az containerapp show -g "$RG" -n "${PREFIX}-api" \
            --query properties.configuration.ingress.fqdn -o tsv 2>/dev/null || true)
          if [ -n "$API_FQDN" ]; then
            echo "api_url=https://${API_FQDN}" >> "$GITHUB_OUTPUT"
          else
            echo "api_url=" >> "$GITHUB_OUTPUT"
            echo "::notice::First deploy — web will rebuild with the real API URL on the next deploy."
          fi
          # Capture the currently-running image tag so the post-deploy smoke can
          # roll back to this known-good revision if the new one is broken.
          LAST_GOOD=$(az containerapp show -g "$RG" -n "${PREFIX}-api" \
            --query "properties.template.containers[0].image" -o tsv 2>/dev/null | sed 's/.*://' || true)
          echo "last_good_tag=${LAST_GOOD}" >> "$GITHUB_OUTPUT"
          [ -n "$LAST_GOOD" ] && echo "::notice::Last-good image tag for rollback: ${LAST_GOOD}" || true

      - name: Compute lowercase ghcr namespace
        id: ns
        run: |
          # ghcr.io requires the owner segment to be lowercase even if the GitHub
          # login isn't. github.repository_owner preserves case; downcase it.
          echo "owner_lc=$(echo "${GHCR_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner_lc }}/truerate-api:${{ env.IMAGE_TAG }}
            ghcr.io/${{ steps.ns.outputs.owner_lc }}/truerate-api:latest

      - name: Build and push MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/mcp/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner_lc }}/truerate-mcp:${{ env.IMAGE_TAG }}
            ghcr.io/${{ steps.ns.outputs.owner_lc }}/truerate-mcp:latest

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ steps.api-url.outputs.api_url }}
          tags: |
            ghcr.io/${{ steps.ns.outputs.owner_lc }}/truerate-web:${{ env.IMAGE_TAG }}
            ghcr.io/${{ steps.ns.outputs.owner_lc }}/truerate-web:latest

      # NOTE: Container Apps pull anonymously from ghcr.io, so the three
      # packages must be PUBLIC. GitHub does NOT expose a REST endpoint to
      # flip visibility on user-owned packages — it's a one-time manual step
      # done in the web UI by the package owner the first time the package
      # appears:
      #   https://github.com/users/<owner>/packages/container/truerate-<api|mcp|web>/settings
      #   → Change visibility → Public
      # If a package is private, the Bicep deploy below fails fast with
      # 'UNAUTHORIZED: authentication required' from ghcr.io, identifying
      # exactly which package is the problem.

      - name: Deploy Bicep with real image refs
        id: deploy
        env:
          JWT_SECRET: ${{ secrets.TRUERATE_JWT_SECRET }}
          CRED_KEY: ${{ secrets.TRUERATE_CRED_KEY }}
          # Optional: enables the admin console (catalog editor, flags, leaderboard).
          # If the repo secret is unset this is empty and the admin endpoints stay
          # 401 — non-breaking. Set TRUERATE_ADMIN_SECRET to activate.
          ADMIN_SECRET: ${{ secrets.TRUERATE_ADMIN_SECRET }}
          # Optional Stripe billing (#351). Unset = billing endpoints stay 501.
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID: ${{ vars.STRIPE_PRICE_ID }}
          OWNER_LC: ${{ steps.ns.outputs.owner_lc }}
        run: |
          set -euo pipefail
          test -n "$JWT_SECRET" || { echo "::error::TRUERATE_JWT_SECRET secret is not set"; exit 1; }
          test -n "$CRED_KEY"   || { echo "::error::TRUERATE_CRED_KEY secret is not set"; exit 1; }
          if [ -z "${ADMIN_SECRET:-}" ]; then
            echo "::notice::TRUERATE_ADMIN_SECRET not set — admin console stays disabled (401). Set it to enable."
          fi
          if [ -z "${STRIPE_SECRET_KEY:-}" ]; then
            echo "::notice::STRIPE_SECRET_KEY not set — billing endpoints stay 501. Set it + STRIPE_PRICE_ID + STRIPE_WEBHOOK_SECRET to enable."
          fi

          echo "==> Deploying Bicep (idempotent)"
          az deployment group create -g "$RG" -f infra/main.bicep -o none \
            -p namePrefix="$PREFIX" jwtSecret="$JWT_SECRET" credKey="$CRED_KEY" \
               adminSecret="${ADMIN_SECRET:-}" \
               stripeSecretKey="${STRIPE_SECRET_KEY:-}" \
               stripeWebhookSecret="${STRIPE_WEBHOOK_SECRET:-}" \
               stripePriceId="${STRIPE_PRICE_ID:-}" \
               apiImage="ghcr.io/${OWNER_LC}/truerate-api:${IMAGE_TAG}" \
               mcpImage="ghcr.io/${OWNER_LC}/truerate-mcp:${IMAGE_TAG}" \
               webImage="ghcr.io/${OWNER_LC}/truerate-web:${IMAGE_TAG}"

          WEB_URL=$(az deployment group show -g "$RG" -n main --query properties.outputs.webUrl.value -o tsv)
          API_OUT=$(az deployment group show -g "$RG" -n main --query properties.outputs.apiUrl.value -o tsv)
          MCP_URL=$(az deployment group show -g "$RG" -n main --query properties.outputs.mcpUrl.value -o tsv)
          echo "web_url=$WEB_URL" >> "$GITHUB_OUTPUT"
          echo "api_url=$API_OUT" >> "$GITHUB_OUTPUT"
          echo "mcp_url=$MCP_URL" >> "$GITHUB_OUTPUT"

          {
            echo "### TrueRate deployed :rocket:"
            echo ""
            echo "| Surface | URL |"
            echo "| --- | --- |"
            echo "| Web | $WEB_URL |"
            echo "| API | $API_OUT |"
            echo "| MCP | $MCP_URL |"
            echo ""
            echo "Image tag: \`$IMAGE_TAG\`"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Post-deploy verification ──────────────────────────────────────────
      # Health checks are NOT enough — a stale/broken image can serve /health
      # 200 while the core action (add a membership) 500s. This gate runs the
      # REAL member loop against the just-deployed URLs and FAILS the deploy
      # (rolling back) if it's broken.
      - uses: pnpm/action-setup@v4
        with: { version: 9.12.0 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - name: Install deps (for the smoke client)
        run: pnpm install --frozen-lockfile
      - name: Post-deploy smoke (live member core loop + no-price guard)
        id: smoke
        env:
          API_URL: ${{ steps.deploy.outputs.api_url }}
          WEB_URL: ${{ steps.deploy.outputs.web_url }}
          MCP_URL: ${{ steps.deploy.outputs.mcp_url }}
        run: node apps/mcp/scripts/post-deploy-smoke.mjs
      - name: Roll back to last-good image on smoke failure
        if: failure() && steps.smoke.outcome == 'failure' && steps.api-url.outputs.last_good_tag != ''
        env:
          JWT_SECRET: ${{ secrets.TRUERATE_JWT_SECRET }}
          CRED_KEY: ${{ secrets.TRUERATE_CRED_KEY }}
          ADMIN_SECRET: ${{ secrets.TRUERATE_ADMIN_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PRICE_ID: ${{ vars.STRIPE_PRICE_ID }}
          OWNER_LC: ${{ steps.ns.outputs.owner_lc }}
          LAST_GOOD: ${{ steps.api-url.outputs.last_good_tag }}
        run: |
          set -uo pipefail
          echo "::error::Post-deploy smoke FAILED — rolling back to ${LAST_GOOD}"
          az deployment group create -g "$RG" -f infra/main.bicep -o none \
            -p namePrefix="$PREFIX" jwtSecret="$JWT_SECRET" credKey="$CRED_KEY" \
               adminSecret="${ADMIN_SECRET:-}" \
               stripeSecretKey="${STRIPE_SECRET_KEY:-}" \
               stripeWebhookSecret="${STRIPE_WEBHOOK_SECRET:-}" \
               stripePriceId="${STRIPE_PRICE_ID:-}" \
               apiImage="ghcr.io/${OWNER_LC}/truerate-api:${LAST_GOOD}" \
               mcpImage="ghcr.io/${OWNER_LC}/truerate-mcp:${LAST_GOOD}" \
               webImage="ghcr.io/${OWNER_LC}/truerate-web:${LAST_GOOD}" \
            && echo "::notice::Rolled back to ${LAST_GOOD}." \
            || echo "::error::Rollback ALSO failed — manual intervention required."

      # A Bicep deploy resets each app's ingress, dropping custom-domain bindings
      # (the Bicep doesn't declare them — managed certs require DNS validation out
      # of band). Re-bind here on EVERY run, reusing the existing managed certs
      # (fast, no re-provisioning). Idempotent: skips hostnames already bound.
      - name: Re-ensure customrates.online custom domains
        if: always()
        env:
          ENV_NAME: truerate-env
        run: |
          set -uo pipefail
          rebind() {
            app="$1"; host="$2"
            bound=$(az containerapp hostname list -g "$RG" -n "$app" --query "[?name=='$host'].bindingType | [0]" -o tsv 2>/dev/null || true)
            if [ -n "$bound" ] && [ "$bound" != "Disabled" ]; then echo "  $host already bound"; return; fi
            cert=$(az containerapp env certificate list -g "$RG" -n "$ENV_NAME" --managed-certificates-only \
                   --query "[?properties.subjectName=='$host'].id | [0]" -o tsv 2>/dev/null || true)
            az containerapp hostname add -g "$RG" -n "$app" --hostname "$host" -o none 2>&1 | sed 's/^/  add: /' || true
            if [ -n "$cert" ]; then
              az containerapp hostname bind -g "$RG" -n "$app" --hostname "$host" --certificate "$cert" -o none 2>&1 | sed 's/^/  bind(reuse): /' || true
            else
              az containerapp hostname bind -g "$RG" -n "$app" --hostname "$host" --environment "$ENV_NAME" --validation-method HTTP -o none 2>&1 | sed 's/^/  bind(new): /' || true
            fi
          }
          rebind truerate-web customrates.online
          rebind truerate-web www.customrates.online
          rebind truerate-api api.customrates.online
          rebind truerate-mcp mcp.customrates.online
