name: Scale harness (~1000 personas)

# Full-scale synthetic-user run (#335). Operator-triggered only — do NOT add
# `push` or `schedule` triggers here; the run registers ~1000 test users and
# must not hammer prod or a shared staging environment automatically.
#
# How to run:
#   GitHub UI  → Actions → "Scale harness (~1000 personas)" → Run workflow
#   CLI:  gh workflow run scale-harness.yml \
#           -f api_url=https://api.truerate.app \
#           -f mcp_url=https://mcp.truerate.app \
#           -f n=1000 \
#           -f seed=0 \
#           -f concurrency=10
#
# Inputs:
#   api_url     — HTTPS base URL of the target API (required)
#   mcp_url     — HTTPS base URL of the target MCP server (required)
#   n           — number of personas (default 1000)
#   seed        — PRNG seed (default 0; use a different value to vary personas)
#   concurrency — max concurrent personas (default 10; lower for prod to reduce load)
#
# Rate-limit note (#302):
#   The harness uses TRUERATE_INMEMORY=false against a live deployment, so the
#   signup rate-limit applies (5/hour per IP by default). For large N (> 5):
#     - Use a staging deployment that has SIGNUP_RATE_LIMIT_HOUR_MAX overridden,
#       OR set concurrency=1 and accept a slow run,
#     - OR split the run into batches (different seeds) across hours.
#   The workflow sets SIGNUP_RATE_LIMIT_HOUR_MAX=10000 in the environment so it
#   only takes effect if the target deployment reads that env var (staging only).

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: "API base URL (e.g. https://api.truerate.app)"
        required: true
        type: string
      mcp_url:
        description: "MCP base URL (e.g. https://mcp.truerate.app)"
        required: true
        type: string
      n:
        description: "Number of personas (default 1000)"
        required: false
        default: "1000"
        type: string
      seed:
        description: "PRNG seed for reproducible personas (default 0)"
        required: false
        default: "0"
        type: string
      concurrency:
        description: "Max concurrent personas (default 10; lower for prod)"
        required: false
        default: "10"
        type: string

jobs:
  scale-run:
    name: "Scale harness — N=${{ inputs.n }} concurrency=${{ inputs.concurrency }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (core, harness)
        run: pnpm --filter @truerate/core build && pnpm --filter @truerate/harness build

      - name: Run scale harness
        run: node --import tsx packages/harness/scripts/run-scale.ts
        env:
          SCALE_API_URL: ${{ inputs.api_url }}
          SCALE_MCP_URL: ${{ inputs.mcp_url }}
          SCALE_N: ${{ inputs.n }}
          SCALE_SEED: ${{ inputs.seed }}
          SCALE_CONCURRENCY: ${{ inputs.concurrency }}
          # Hint for staging deployments to relax signup rate-limiting.
          SIGNUP_RATE_LIMIT_HOUR_MAX: "10000"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scale-harness-report-${{ inputs.seed }}-${{ inputs.n }}
          path: scale-report.json
          retention-days: 30
          if-no-files-found: ignore
