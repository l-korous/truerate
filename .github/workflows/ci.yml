name: CI

on:
  push:
    # `claude/**` so an autonomous agent's branch push runs the gauntlet even
    # before/independent of a PR being opened (the PR then shows these checks).
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  # Lets the auto-merge sweeper re-trigger CI on a branch after it updates it to
  # the latest main. A branch update done with GITHUB_TOKEN does not itself fire
  # push/pull_request CI (recursion guard), so the checks would otherwise be
  # missing and the PR could never satisfy the merge gate.
  workflow_dispatch: {}

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Typecheck & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # `pnpm test` builds @truerate/core first, then runs every package's
      # node:test suite (core, api, mcp, extension). c8 wraps each package's
      # test run and enforces per-package coverage thresholds (see .c8rc.json).
      - name: Unit & integration tests
        run: pnpm test

      - name: Upload coverage reports
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            packages/core/coverage/coverage-summary.json
            apps/api/coverage/coverage-summary.json
            apps/mcp/coverage/coverage-summary.json
          retention-days: 30
          if-no-files-found: warn

  build:
    name: Build web (production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build packages (core, harness)
        # harness (@truerate/harness) is consumed by web + e2e and exposes types
        # from dist/, so it must be built like core or `next build`/Playwright
        # can't resolve it ("Cannot find module '@truerate/harness'").
        run: pnpm --filter @truerate/core build && pnpm --filter @truerate/harness build
      - name: Build web
        # NEXT_PUBLIC_API_BASE_URL is baked at build time; the real value is
        # injected during deploy. A placeholder is fine for the CI build check.
        run: pnpm --filter @truerate/web build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://example.invalid

  e2e:
    name: Playwright journey
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build packages (core, harness)
        # harness (@truerate/harness) is consumed by web + e2e and exposes types
        # from dist/, so it must be built like core or `next build`/Playwright
        # can't resolve it ("Cannot find module '@truerate/harness'").
        run: pnpm --filter @truerate/core build && pnpm --filter @truerate/harness build
      - name: Install Playwright browser
        run: pnpm --filter @truerate/web exec playwright install --with-deps chromium
      - name: Run end-to-end journey
        run: pnpm test:e2e
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report
          retention-days: 7
          if-no-files-found: ignore

  images:
    name: Build container images
    # CI used to verify only typecheck/test/web-build, never the production
    # Docker images. Three integration breaks (duplicate catalog store; a new
    # workspace package the mcp/web Dockerfiles didn't copy) reached main green
    # and broke the deploy. This job closes that gap: it builds all three
    # images on every PR (build only, no push). See #217.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          tags: truerate-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - name: Build mcp image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/mcp/Dockerfile
          push: false
          tags: truerate-mcp:ci
          cache-from: type=gha,scope=mcp
          cache-to: type=gha,mode=max,scope=mcp
      # NEXT_PUBLIC_* is inlined at build time; the real API URL is injected at
      # deploy. A placeholder is fine for the build check.
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false
          tags: truerate-web:ci
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://example.invalid
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
