name: Claude Code

# Mention-driven only: the agent runs when someone comments "@claude ..." on an
# issue or PR. No surprise runs on every push/issue, so GitHub Actions minutes
# (this is the only cost vector here — the model itself runs on the Max plan via
# the OAuth token, not pay-as-you-go API billing) stay low.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

# One Claude run at a time per issue/PR; don't cancel an in-flight run.
concurrency:
  group: claude-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  claude:
    # Only spin up a runner when the comment actually mentions @claude.
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write       # create branches / commits
      pull-requests: write  # open PRs, comment
      issues: write         # comment on issues
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          # Max-plan auth (NOT an API key → no pay-as-you-go billing).
          # Generate locally with `claude setup-token`, then add as the repo
          # secret CLAUDE_CODE_OAUTH_TOKEN (Settings → Secrets → Actions).
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
